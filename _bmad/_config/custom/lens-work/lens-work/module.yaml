      - .cursor/commands/bmad-lens-work-next.md
      - .cursor/commands/bmad-lens-work-switch.md
      - .cursor/commands/bmad-lens-work-help.md
      - .cursor/commands/bmad-lens-work-promote.md
      - .cursor/commands/bmad-lens-work-constitution.md
      - .cursor/commands/bmad-lens-work-compliance.md
      - .cursor/commands/bmad-lens-work-sense.md
      - .cursor/commands/bmad-lens-work-module-management.md
  claude:
